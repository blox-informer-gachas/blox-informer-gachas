<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VV: Ultimatum Interactive Skill Tree</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: 0.25s;
        }
        body {
            margin: 0;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }
        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .zoom-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: rgba(8, 18, 26, 0.85);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #2f7088;
            z-index: 200;
        }
        .zoom-panel button {
            background: #0f212e;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.1s;
        }
        .zoom-panel button:hover {
            background: #1e5a72;
            box-shadow: 0 0 6px cyan;
        }
        .tooltip-node {
            position: fixed;
            background: #0b121fe6;
            backdrop-filter: blur(12px);
            border-left: 4px solid #5ad0ff;
            border-radius: 12px;
            padding: 12px 16px;
            max-width: 280px;
            pointer-events: none;
            z-index: 1000;
            font-family: 'Share Tech Mono', monospace;
            box-shadow: 0 6px 18px black;
            font-size: 0.85rem;
            transition: opacity 0.1s;
            color: #f0faff;
        }
        .tooltip-node .node-name {
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .tooltip-node .level-req {
            color: #ffcc66;
            font-size: 0.8rem;
        }
        .tooltip-node .desc {
            color: #b0b8c5;
            margin: 8px 0;
        }
        .tooltip-node hr {
            margin: 6px 0;
            border-color: #5e8ea0;
        }
        .standalone-search {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 210;
            background: rgba(8, 18, 26, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            border: 1px solid #2f7088;
            display: flex;
            gap: 8px;
            align-items: center;
            font-family: 'Orbitron', monospace;
        }
        .standalone-search input {
            background: #071217;
            border: 1px solid #2f6f8a;
            border-radius: 20px;
            padding: 8px 14px;
            color: white;
            font-family: monospace;
            width: 200px;
            outline: none;
            font-size: 1rem;
        }

        .standalone-search input:focus {
            border-color: #77aadd;
            box-shadow: 0 0 6px #77aadd;
        }
        @media (max-width: 600px) {
            .standalone-search { top: 10px; left: 10px; }
            .standalone-search input { width: 140px; }
            .zoom-panel { bottom: 12px; right: 12px; padding: 6px 10px; }
            .zoom-panel button { width: 32px; height: 32px; font-size: 1rem; }
            .tooltip-node { max-width: 220px; font-size: 0.75rem; padding: 8px 12px; }
        }
    </style>
</head>

    function drawNebulaBackground(now) {

ctx.fillStyle = 'rgba(180, 200, 255, 0.2)';

    function drawTravelingParticles(now) {
    if (edgeList.length === 0) return;
    const speed = 0.001;           
    const travelTime = now * speed;
    const dashLength = 10;           
    const dashCount = 6;             
    ctx.save();
    ctx.shadowBlur = 0;
    for (let edge of edgeList) {
        const from = edge.from, to = edge.to;
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 0.1) continue;
        const dirX = dx / dist;
        const dirY = dy / dist;
        
        for (let p = 0; p < dashCount; p++) {
            const phaseOffset = p / dashCount;  
            let phase = (travelTime + phaseOffset) % 1.0;
            const tStart = phase;
            const startX = from.x + dirX * dist * tStart;
            const startY = from.y + dirY * dist * tStart;
            let tEnd = tStart + dashLength / dist;
            let endX, endY;
            if (tEnd >= 1.0) {
                endX = to.x;
                endY = to.y;
            } else {
                endX = from.x + dirX * dist * tEnd;
                endY = from.y + dirY * dist * tEnd;
            }
            const screenStart = worldToScreen(startX, startY);
            const screenEnd = worldToScreen(endX, endY);
            
            ctx.beginPath();
            ctx.moveTo(screenStart.x, screenStart.y);
            ctx.lineTo(screenEnd.x, screenEnd.y);
            ctx.strokeStyle = edge.color;
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 5;
            ctx.shadowColor = "rgba(255,200,100,0.7)";
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(screenEnd.x, screenEnd.y, 2.5, 0, Math.PI*2);
            ctx.fillStyle = edge.color;
            ctx.fill();
        }
    }
    ctx.restore();
}
    
    function applyNodePattern(node, x, y, radius, isMatching) {
        const pattern = node.patternType;
        const angle = (node.patternAngle || 0) + (isMatching ? 0 : 0); 
        ctx.save();
        if (!isMatching) {
            ctx.globalAlpha = 0.55;
            ctx.filter = "grayscale(0.7)";
        } else {
            ctx.filter = "none";
            ctx.globalAlpha = 1;
        }
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowBlur = 0;
        
        switch(pattern) {
            case 'hex':
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const rad = angle + (i * Math.PI * 2 / 6);
                    const px = x + Math.cos(rad) * radius * 0.7;
                    const py = y + Math.sin(rad) * radius * 0.7;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.strokeStyle = isMatching ? 'rgba(255,210,130,0.9)' : '#aaa';
                ctx.lineWidth = 2.2;
                ctx.stroke();
                break;
            case 'stripes':
                for (let i = -radius; i <= radius; i += 6) {
                    const radAngle = angle;
                    const cosA = Math.cos(radAngle), sinA = Math.sin(radAngle);
                    const x1 = x + (i * cosA) - (radius * sinA);
                    const y1 = y + (i * sinA) + (radius * cosA);
                    const x2 = x + (i * cosA) + (radius * sinA);
                    const y2 = y + (i * sinA) - (radius * cosA);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = isMatching ? 'rgba(255, 200, 100, 0.8)' : '#aaa';
                    ctx.lineWidth = 1.8;
                    ctx.stroke();
                }
                break;
            case 'dots':
                for (let i = 0; i < 18; i++) {
                    const rAngle = angle + (i * Math.PI * 2 / 18);
                    const dx = Math.cos(rAngle) * radius * 0.65;
                    const dy = Math.sin(rAngle) * radius * 0.65;
                    ctx.beginPath();
                    ctx.arc(x + dx, y + dy, radius * 0.12, 0, Math.PI*2);
                    ctx.fillStyle = isMatching ? 'rgba(255, 220, 140, 0.9)' : '#aaa';
                    ctx.fill();
                }
                break;
            case 'radialLines':
                for (let i = 0; i < 12; i++) {
                    const radAng = angle + (i * Math.PI * 2 / 12);
                    const px = x + Math.cos(radAng) * radius * 0.9;
                    const py = y + Math.sin(radAng) * radius * 0.9;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(px, py);
                    ctx.strokeStyle = isMatching ? 'rgba(230,210,150,0.8)' : '#aaa';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                break;
            case 'glowEdge':
                ctx.beginPath();
                ctx.arc(x, y, radius + 2, 0, Math.PI*2);
                ctx.strokeStyle = isMatching ? `rgba(100, 200, 255, 0.7)` : '#888';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                break;
            default: break;
        }
        ctx.restore();
    }
    
    function drawActiveNodeFlow(node, x, y, radius, now) {

function drawMistAura(node, now, isMatching) {
    if (!isMatching) return;
    
    const time = now * 0.002;
    const pulse = 0.65 + Math.sin(time * 1.2 + node.id) * 0.25;
    
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.shadowBlur = 0;
    
    for (let layer = 0; layer < 3; layer++) {
        const offset = layer * 1.5;
        const radius = node.radius + 3 + offset + Math.sin(time * 1.5 + layer) * 1.5;
        const alpha = (0.15 - layer * 0.04) * pulse;
        
        ctx.beginPath();
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        
        let r, g, b;
        if (node.fillColor.startsWith('#')) {
            r = parseInt(node.fillColor.slice(1,3), 16);
            g = parseInt(node.fillColor.slice(3,5), 16);
            b = parseInt(node.fillColor.slice(5,7), 16);
        } else {
            r = 100; g = 150; b = 220;
        }
        ctx.fillStyle = `rgba(${r + 40}, ${g + 30}, ${b + 20}, ${alpha})`;
        ctx.fill();
    }
    
    ctx.beginPath();
    const waves = 8;
    const waveRadius = node.radius + 5 + Math.sin(time * 1.2) * 1.5;
    for (let i = 0; i <= 360; i += 15) {
        const rad = i * Math.PI / 180;
        const wiggle = Math.sin(rad * waves + time * 2.5) * 2;
        const x = node.x + (waveRadius + wiggle) * Math.cos(rad);
        const y = node.y + (waveRadius + wiggle) * Math.sin(rad);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    const waveAlpha = 0.1 + Math.sin(time * 1.8) * 0.06;
    ctx.fillStyle = `rgba(200, 180, 255, ${waveAlpha})`;
    ctx.fill();
    
    ctx.restore();
}

    ctx.beginPath();
    ctx.arc(x, y, r + 4 + Math.sin(t * 1.5) * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(108, 144, 197, ${0.25 + Math.sin(t * 0.8) * 0.1})`;
    ctx.fill();
    
    for (let i = 0; i < 3; i++) {
        const angleOffset = t * 1.2 + i * Math.PI * 2 / 3;
        const start = angleOffset;
        const end = start + Math.PI * 1.2;
        ctx.beginPath();
        ctx.arc(x, y, r - 8 + Math.sin(t * 1.5 + i) * 4, start, end);
        ctx.strokeStyle = `rgba(145, 201, 244, ${0.7 + Math.sin(t * 1.5 + i) * 0.3})`;
        ctx.lineWidth = 6;
        ctx.stroke();
    }
    
    for (let p = 0; p < 40; p++) {
        const angle = (p * 37) % 360 + t * 4;
        const rad = angle * Math.PI / 180;
        const dist = (r - 12) * (0.3 + 0.7 * (Math.sin(t * 1.5 + p) * 0.5 + 0.5));
        const px = x + Math.cos(rad) * dist;
        const py = y + Math.sin(rad) * dist;
        ctx.beginPath();
        ctx.arc(px, py, 1.5 + Math.sin(t * 3 + p) * 1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(145, 201, 244, ${0.6 + Math.sin(t * 1.2 + p) * 0.3})`;
        ctx.fill();
    }
    
    const corePulse = 0.35 + Math.sin(t * 1.8) * 0.07;   
    const coreRadius = r * corePulse;
    
    const ringRadius = coreRadius ;
    ctx.beginPath();
    ctx.arc(x, y, ringRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(108, 144, 197, ${0.8 + Math.sin(t * 2.2) * 0.2})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(x, y, coreRadius - 1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.9 + Math.sin(t * 2.5) * 0.1})`;
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(x, y, coreRadius * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `white`;
    ctx.fill();
    
    ctx.restore();
}
    
    function draw() {
        if (!ctx) return;
        const now = performance.now();
        drawNebulaBackground(now);

        for (let node of nodes) {
    const current = glowIntensityMap.get(node.id) || 0;
    const target = glowTargetMap.get(node.id) || 0;
    let newVal = current;
    if (Math.abs(current - target) < 0.01) {
        newVal = target;
    } else {
        newVal = current + (target - current) * 0.2;
    }
    glowIntensityMap.set(node.id, newVal);
}
        
        drawTravelingParticles(now);
        
        
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(zoom, zoom);
        
        
        const lowerTerm = searchTerm.toLowerCase();
        const pulseTime = now / 1000;
        for (let node of nodes) {
            const matches = lowerTerm === "" || node.name.toLowerCase().includes(lowerTerm);
            drawMistAura(node, now, matches);
        }
        for (let node of nodes) {
            const matches = lowerTerm === "" || node.name.toLowerCase().includes(lowerTerm);
            const isActiveGlow = (activeGlowNodeId === node.id);

            if (node.isPreset) {
    drawEnergyFlux(node, now);
    continue; 
}
            
            let fillColor = node.fillColor;
            if (!matches) {
                fillColor = desaturateColor(node.fillColor);
            }
            
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(node.x - 5, node.y - 5, 5, node.x, node.y, node.radius);
            grad.addColorStop(0, fillColor);
            grad.addColorStop(1, matches ? "#1e3a4a" : "#2a2a2a");
            ctx.fillStyle = grad;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
            ctx.strokeStyle = matches ? "#c0f0ff" : "#666";
            ctx.lineWidth = 2 / zoom;
            ctx.stroke();
            
            if (matches && lowerTerm !== "") {
                const glowWidth = (3 + (Math.sin(pulseTime * Math.PI * 2) * 0.5 + 0.5) * 2) / zoom;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius + 3 + Math.sin(pulseTime * 5) * 1.5, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 215, 100, ${0.7 + Math.sin(pulseTime * 8) * 0.3})`;
                ctx.lineWidth = glowWidth;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius + 1, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 180, 80, 0.9)`;
                ctx.lineWidth = 2 / zoom;
                ctx.stroke();
            }
            
            applyNodePattern(node, node.x, node.y, node.radius, matches);
            
            if (isActiveGlow && matches) {
                drawActiveNodeFlow(node, node.x, node.y, node.radius, now);
            }
            
            drawNodeText(node, node.x, node.y, matches);
        }
        ctx.restore();
        
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(() => draw());
    }
    
    function hideTooltip() {
    if (hoverTimeout) clearTimeout(hoverTimeout);
    if (activeGlowNodeId) {
        glowTargetMap.set(activeGlowNodeId, 0);
        activeGlowNodeId = null;
    }
    if (tooltipElement) {
        tooltipElement.style.opacity = '0';
        setTimeout(() => {
            if (tooltipElement && tooltipElement.parentNode) {
                tooltipElement.remove();
                tooltipElement = null;
            }
        }, 150);
    }
    currentTooltipNode = null;
}

function showTooltipForNode(node, screenX, screenY) {
    if (node.isPreset) return;
    if (currentTooltipNode === node && tooltipElement) return;
    
    if (activeGlowNodeId && activeGlowNodeId !== node.id) {
        glowTargetMap.set(activeGlowNodeId, 0);
    }
    activeGlowNodeId = node.id;
    glowTargetMap.set(node.id, 1);
    
    if (tooltipElement) {
        tooltipElement.remove();
        tooltipElement = null;
    }
    const div = document.createElement("div");
    div.className = "tooltip-node";
    div.style.opacity = '0';
    div.style.transition = 'opacity 0.15s ease';
    div.innerHTML = `
        <div class="node-name">${escapeHtml(node.name)}</div>
        <div class="level-req">Level ${node.levelReq}</div>
        <div class="desc">${escapeHtml(node.description)}</div>
        <hr/>
        <div>${node.detailedHTML || "—"}</div>
    `;
    document.body.appendChild(div);
    
    let left = screenX + 15;
    let top = screenY - 40;
    const rect = div.getBoundingClientRect();
    if (top < 0) top = screenY + 20;
    if (top + rect.height > window.innerHeight) top = screenY - rect.height - 10;
    if (left + rect.width > window.innerWidth) left = screenX - rect.width - 10;
    if (left < 0) left = 10;
    div.style.left = left + "px";
    div.style.top = top + "px";
    tooltipElement = div;
    currentTooltipNode = node;
    div.offsetHeight;
    div.style.opacity = '1';
}
    
    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function getNodeAtScreen(screenX, screenY) {
        const world = screenToWorld(screenX, screenY);
        for (let node of nodes) {
        if (node.isPreset) continue; 
            const dx = node.x - world.x;
            const dy = node.y - world.y;
            if (Math.hypot(dx, dy) <= node.radius) {
                return node;
            }
        }
        return null;
    }
    
    function zoomAtPoint(zoomDelta, screenCenterX, screenCenterY) {
        const oldZoom = zoom;
        let newZoom = zoom * zoomDelta;
        newZoom = Math.min(3.0, Math.max(0.3, newZoom));
        if (newZoom === zoom) return;
        const worldBefore = screenToWorld(screenCenterX, screenCenterY);
        zoom = newZoom;
        const worldAfter = screenToWorld(screenCenterX, screenCenterY);
        offsetX += (worldAfter.x - worldBefore.x) * zoom;
        offsetY += (worldAfter.y - worldBefore.y) * zoom;
        hideTooltip();
    }
    
    function resetView() {
        if (!nodes.length) {
            zoom = 1; offsetX = 0; offsetY = 0; return;
        }
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodes.forEach(n => {
            minX = Math.min(minX, n.x - n.radius);
            minY = Math.min(minY, n.y - n.radius);
            maxX = Math.max(maxX, n.x + n.radius);
            maxY = Math.max(maxY, n.y + n.radius);
        });
        const contentW = maxX - minX + 100;
        const contentH = maxY - minY + 100;
        const viewW = canvasWidth;
        const viewH = canvasHeight;
        let fitZoom = Math.min(viewW / contentW, viewH / contentH, 1.8);
        fitZoom = Math.min(2.5, Math.max(0.4, fitZoom));
        zoom = fitZoom;
        const centerWorldX = (minX + maxX) / 2;
        const centerWorldY = (minY + maxY) / 2;
        offsetX = viewW / 2 - centerWorldX * zoom;
        offsetY = viewH / 2 - centerWorldY * zoom;
        hideTooltip();
    }
    
    function initEvents() {
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartOffsetX = offsetX;
            dragStartOffsetY = offsetY;
            canvas.style.cursor = 'grabbing';
            hideTooltip();
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            offsetX = dragStartOffsetX + dx;
            offsetY = dragStartOffsetY + dy;
        });
        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                canvas.style.cursor = 'grab';
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                tapStartX = touch.clientX;
                tapStartY = touch.clientY;
                isPotentialTap = true;
                isDragging = true;
                dragStartX = touch.clientX;
                dragStartY = touch.clientY;
                dragStartOffsetX = offsetX;
                dragStartOffsetY = offsetY;
                hideTooltip();
                e.preventDefault();
            }
        });
        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const touch = e.touches[0];
                const dx = touch.clientX - dragStartX;
                const dy = touch.clientY - dragStartY;
                if (isPotentialTap && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) isPotentialTap = false;
                offsetX = dragStartOffsetX + dx;
                offsetY = dragStartOffsetY + dy;
                e.preventDefault();
            }
        });
        window.addEventListener('touchend', (e) => {
            if (isPotentialTap && e.touches.length === 0) {
                const node = getNodeAtScreen(tapStartX, tapStartY);
                if (node) showTooltipForNode(node, tapStartX, tapStartY);
                else hideTooltip();
                isPotentialTap = false;
            }
            isDragging = false;
            canvas.style.cursor = 'grab';
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.92 : 1.08;
            zoomAtPoint(delta, e.clientX, e.clientY);
        }, { passive: false });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const t1 = e.touches[0], t2 = e.touches[1];
                const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
                initialPinchDist = Math.hypot(dx, dy);
                initialZoom = zoom;
                pinchCenterX = (t1.clientX + t2.clientX) / 2;
                pinchCenterY = (t1.clientY + t2.clientY) / 2;
                hideTooltip();
                isPotentialTap = false;
                isDragging = false;
            }
        });
        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDist > 0) {
                e.preventDefault();
                const t1 = e.touches[0], t2 = e.touches[1];
                const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
                const newDist = Math.hypot(dx, dy);
                const scale = newDist / initialPinchDist;
                let newZoom = initialZoom * scale;
                newZoom = Math.min(3.0, Math.max(0.3, newZoom));
                if (newZoom !== zoom) {
                    const worldCenter = screenToWorld(pinchCenterX, pinchCenterY);
                    zoom = newZoom;
                    const newWorldCenter = screenToWorld(pinchCenterX, pinchCenterY);
                    offsetX += (newWorldCenter.x - worldCenter.x) * zoom;
                    offsetY += (newWorldCenter.y - worldCenter.y) * zoom;
                }
            }
        });
        canvas.addEventListener('touchend', () => { initialPinchDist = 0; });
        
        if (!isTouchDevice) {
            canvas.addEventListener('mousemove', (e) => {
                if (isDragging) return;
                const node = getNodeAtScreen(e.clientX, e.clientY);
                if (hoverTimeout) clearTimeout(hoverTimeout);
                if (node) {
                    hoverTimeout = setTimeout(() => {
                        showTooltipForNode(node, e.clientX, e.clientY);
                    }, 150);
                } else {
                    hideTooltip();
                }
            });
            canvas.addEventListener('mouseleave', () => hideTooltip());
        }
        
        canvas.addEventListener('click', (e) => {
            if (!isTouchDevice) {
                const node = getNodeAtScreen(e.clientX, e.clientY);
                if (node) showTooltipForNode(node, e.clientX, e.clientY);
                else hideTooltip();
            }
        });
        document.body.addEventListener('click', (e) => {
            if (!e.target.closest('.tooltip-node') && e.target !== canvas && !canvas.contains(e.target)) hideTooltip();
        });
    }
    
    function initUI() {
        const searchInput = document.getElementById('searchInputViewer');
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
        });
        document.getElementById('zoomInBtn').addEventListener('click', () => zoomAtPoint(1.2, canvasWidth/2, canvasHeight/2));
        document.getElementById('zoomOutBtn').addEventListener('click', () => zoomAtPoint(0.8, canvasWidth/2, canvasHeight/2));
        document.getElementById('resetViewBtn').addEventListener('click', () => resetView());
    }
    
    window.onload = () => {
        canvas = document.getElementById('treeCanvas');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        initEvents();
        initUI();
        resetView();
        rebuildEdges();
        window.addEventListener('resize', () => {
            resizeCanvas();
            resetView();
        });
        draw();
    };
</script>
</body>
</html>
